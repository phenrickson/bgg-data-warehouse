name: Probe curl_cffi

on:
  workflow_dispatch:

jobs:
  probe:
    name: curl_cffi datacenter probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Probe sitemapindex with curl_cffi
        run: |
          uv run --with curl_cffi python scripts/cf_curl_probe.py
